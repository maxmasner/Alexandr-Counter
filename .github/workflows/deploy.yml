# Repository variables required:
# - REGISTRY_HOST
# - REGISTRY_USERNAME
# - REGISTRY_PASSWORD
# - KOMODO_DEPLOY_WEBHOOK
name: Build, push, and deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    name: Validate compose + Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cp .env.example .env
      - run: docker compose -f docker-compose.prod.yml -f docker-compose.build.yml config > /dev/null
      - run: docker build -t alexandr-counter-app:ci .

  build-and-push:
    name: Build & push image
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ vars.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ vars.REGISTRY_HOST }}/alexandr-counter-app:latest
            ${{ vars.REGISTRY_HOST }}/alexandr-counter-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Komodo redeploy
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      # No SSH key needed: Komodo already has its own credentials to the
      # registry (set up once on its side), so a single authenticated ping
      # is enough to make it pull the tag just pushed above and recreate
      # the container.
      #
      # Unlike Dokploy's webhook, this one doesn't need a push-shaped JSON
      # body. The URL already encodes which Stack and which action
      # (.../stack/<id>/deploy), so Komodo checks the
      # X-Komodo-Webhook-Secret header and deploys that Stack.
      - name: Tell Komodo to redeploy
        run: |
          curl -fsS -X POST "${{ vars.KOMODO_DEPLOY_WEBHOOK }}" \
            -H "X-Komodo-Webhook-Secret: deploy"
